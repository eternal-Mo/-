<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>墨墨机</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            background: #fff;
            height: 100vh;
            overflow: hidden;
        }
        /* 状态栏 */
        .status-bar {
            height: 44px;
            background: rgba(255,255,255,0.9);
            color: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            font-size: 14px;
        }
        /* 主屏幕 */
        .home-screen {
            height: calc(100vh - 44px - 80px);
            background: #fff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        /* 小部件区域 */
        .widget {
            background: rgba(0,0,0,0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 15px;
            color: #000;
        }
        .widget-time {
            font-size: 36px;
            font-weight: 300;
        }
        .widget-date {
            font-size: 16px;
            opacity: 0.7;
        }
        /* 图标网格 - 拖动核心容器 */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: auto;
            min-height: 200px;
        }
        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: #000;
            cursor: grab;
            transition: transform 0.2s, opacity 0.2s;
        }
        .app-icon:active {
            cursor: grabbing;
        }
        .app-icon.dragging {
            opacity: 0.5;
            transform: scale(1.1);
            z-index: 10;
        }
        .app-icon .icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            background: rgba(0,0,0,0.08);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .app-icon .label {
            font-size: 12px;
        }
        /* 底部 Dock 栏 */
        .dock {
            height: 80px;
            background: rgba(255,255,255,0.9);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 20px;
        }
        .dock .app-icon .icon {
            width: 50px;
            height: 50px;
        }
    </style>
</head>
<body>
    <!-- 状态栏 -->
    <div class="status-bar">
        <span>20:30</span>
        <span>📶 🔋 100%</span>
    </div>

    <!-- 主屏幕 -->
    <div class="home-screen">
        <!-- 时间小部件 -->
        <div class="widget">
            <div class="widget-time">20:30</div>
            <div class="widget-date">3月14日 星期六</div>
        </div>

        <!-- 可拖动的应用图标网格 -->
        <div class="app-grid" id="appGrid">
            <div class="app-icon" draggable="true">
                <div class="icon">📱</div>
                <div class="label">电话</div>
            </div>
            <div class="app-icon" draggable="true">
                <div class="icon">💬</div>
                <div class="label">信息</div>
            </div>
            <div class="app-icon" draggable="true">
                <div class="icon">🌐</div>
                <div class="label">浏览器</div>
            </div>
            <div class="app-icon" draggable="true">
                <div class="icon">📷</div>
                <div class="label">相机</div>
            </div>
            <div class="app-icon" draggable="true">
                <div class="icon">🎵</div>
                <div class="label">音乐</div>
            </div>
            <div class="app-icon" draggable="true">
                <div class="icon">📝</div>
                <div class="label">备忘录</div>
            </div>
            <div class="app-icon" draggable="true">
                <div class="icon">🗺️</div>
                <div class="label">地图</div>
            </div>
            <div class="app-icon" draggable="true">
                <div class="icon">⚙️</div>
                <div class="label">设置</div>
            </div>
        </div>
    </div>

    <!-- 底部 Dock 栏 -->
    <div class="dock">
        <div class="app-icon" draggable="true">
            <div class="icon">📞</div>
        </div>
        <div class="app-icon" draggable="true">
            <div class="icon">✉️</div>
        </div>
        <div class="app-icon" draggable="true">
            <div class="icon">🌐</div>
        </div>
        <div class="app-icon" draggable="true">
            <div class="icon">🎵</div>
        </div>
    </div>

    <script>
        // 长按拖动图标功能
        const grid = document.getElementById('appGrid');
        let draggedItem = null;
        let longPressTimer = null;
        let isLongPress = false;

        // 监听所有可拖动图标
        document.querySelectorAll('.app-icon[draggable="true"]').forEach(item => {
            // 长按触发拖动
            item.addEventListener('touchstart', handleTouchStart);
            item.addEventListener('touchend', handleTouchEnd);
            item.addEventListener('touchmove', handleTouchMove);
            
            item.addEventListener('dragstart', handleDragStart);
            item.addEventListener('dragend', handleDragEnd);
            item.addEventListener('dragover', handleDragOver);
            item.addEventListener('dragenter', handleDragEnter);
            item.addEventListener('dragleave', handleDragLeave);
            item.addEventListener('drop', handleDrop);
        });

        // 长按检测
        function handleTouchStart(e) {
            longPressTimer = setTimeout(() => {
                isLongPress = true;
                this.setAttribute('draggable', 'true');
                this.classList.add('dragging');
            }, 500); // 500ms 长按触发
        }

        function handleTouchEnd(e) {
            clearTimeout(longPressTimer);
            if (!isLongPress) {
                // 短按：点击事件
                console.log('点击了:', this.querySelector('.label').textContent);
            }
            isLongPress = false;
            this.setAttribute('draggable', 'false');
            this.classList.remove('dragging');
        }

        function handleTouchMove(e) {
            clearTimeout(longPressTimer); // 移动取消长按
        }

        // 拖动事件处理
        function handleDragStart(e) {
            draggedItem = this;
            this.classList.add('dragging');
        }

        function handleDragEnd(e) {
            this.classList.remove('dragging');
            draggedItem = null;
        }

        function handleDragOver(e) {
            e.preventDefault();
        }

        function handleDragEnter(e) {
            e.preventDefault();
            if (this !== draggedItem) {
                this.style.opacity = '0.3';
            }
        }

        function handleDragLeave(e) {
            this.style.opacity = '1';
        }

        function handleDrop(e) {
            e.preventDefault();
            this.style.opacity = '1';
            if (this !== draggedItem) {
                // 交换两个图标的位置
                const items = Array.from(grid.children);
                const fromIndex = items.indexOf(draggedItem);
                const toIndex = items.indexOf(this);
                
                if (fromIndex < toIndex) {
                    grid.insertBefore(draggedItem, this.nextSibling);
                } else {
                    grid.insertBefore(draggedItem, this);
                }
            }
        }
    </script>
</body>
</html>
