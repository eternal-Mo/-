<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- 关键：让手机正确识别页面尺寸，禁止缩放 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>墨墨机</title>
  <style>
    /* 全局样式重置：消除浏览器默认边距 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 页面背景：让墨墨机居中显示 */
    body {
      background: #f5f5f5;
      padding: 20px 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    /* 墨墨机外壳：自动适配安卓+苹果 */
    .momoji {
      /* 宽度：占手机90%，限制最大/最小尺寸 */
      width: 90vw;
      max-width: 430px;  /* 覆盖安卓大屏 + 苹果Pro Max */
      min-width: 320px;  /* 最小适配小屏手机 */
      
      /* 高度：按19.5:9手机比例自动计算，限制最大/最小 */
      height: calc(90vw * 1.95);
      max-height: 930px;
      min-height: 667px;
      
      background: #1A1A1A; /* 黑色手机壳 */
      border-radius: 40px; /* 圆角手机边框 */
      padding: 12px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.2); /* 阴影更有质感 */
    }

    /* 手机状态栏（可选，模拟真实手机顶部） */
    .phone-status {
      height: 44px;
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      font-size: 14px;
    }

    /* 手机屏幕：嵌入网页的区域 */
    .screen {
      width: 100%;
      height: calc(100% - 44px); /* 减去状态栏高度 */
      background: #fff;
      border-radius: 30px;
      border: none;
    }

    /* 如果不需要状态栏，把上面 .screen 替换成下面这行： */
    /* .screen { width: 100%; height: 100%; background: #fff; border-radius: 30px; border: none; } */
  </style>
</head>
<body>
  <!-- 墨墨机整体结构 -->
  <div class="momoji">
    <!-- 状态栏（可删除） -->
    <div class="phone-status">
      <span>12:00</span>
      <span>📶 🔋 100%</span>
    </div>
    <!-- 手机屏幕：这里可以换成你想加载的网址 -->
    <iframe class="screen" src="https://m.baidu.com"></iframe>
  </div>
</body>
</html>
