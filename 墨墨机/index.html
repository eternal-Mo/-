<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>墨墨机</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            -webkit-user-select: none; /* 禁止手机长按选中文字 */
            user-select: none;
        }
        body {
            background: #fff;
            height: 100vh;
            overflow: hidden; /* 禁止整体滚动 */
        }
        /* 状态栏 */
        .status-bar {
            height: 44px;
            background: rgba(255,255,255,0.9);
            color: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            font-size: 14px;
        }
        /* 主屏幕 */
        .home-screen {
            height: calc(100vh - 44px - 80px);
            background: #fff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        /* 小部件 */
        .widget {
            background: rgba(0,0,0,0.05);
            border-radius: 16px;
            padding: 15px;
            color: #000;
        }
        .widget-time {
            font-size: 36px;
            font-weight: 300;
        }
        .widget-date {
            font-size: 16px;
            opacity: 0.7;
        }
        /* 图标网格 */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: auto;
            flex: 1;
        }
        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: #000;
            transition: transform 0.1s ease-out;
        }
        /* 拖动状态样式 */
        .app-icon.dragging {
            opacity: 0.6;
            transform: scale(1.05);
            z-index: 10;
        }
        .app-icon .icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            background: rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .app-icon .label {
            font-size: 12px;
            text-align: center;
        }
        /* Dock 栏 */
        .dock {
            height: 80px;
            background: rgba(255,255,255,0.9);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 20px;
        }
        .dock .app-icon .icon {
            width: 50px;
            height: 50px;
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <span id="currentTime">20:30</span>
        <span>📶 🔋 100%</span>
    </div>

    <div class="home-screen">
        <div class="widget">
            <div class="widget-time" id="bigTime">20:30</div>
            <div class="widget-date" id="currentDate">3月14日 星期六</div>
        </div>

        <!-- 图标容器 -->
        <div class="app-grid" id="appGrid">
            <div class="app-icon">
                <div class="icon">📱</div>
                <div class="label">电话</div>
            </div>
            <div class="app-icon">
                <div class="icon">💬</div>
                <div class="label">信息</div>
            </div>
            <div class="app-icon">
                <div class="icon">🌐</div>
                <div class="label">浏览器</div>
            </div>
            <div class="app-icon">
                <div class="icon">📷</div>
                <div class="label">相机</div>
            </div>
            <div class="app-icon">
                <div class="icon">🎵</div>
                <div class="label">音乐</div>
            </div>
            <div class="app-icon">
                <div class="icon">📝</div>
                <div class="label">备忘录</div>
            </div>
            <div class="app-icon">
                <div class="icon">🗺️</div>
                <div class="label">地图</div>
            </div>
            <div class="app-icon">
                <div class="icon">⚙️</div>
                <div class="label">设置</div>
            </div>
        </div>
    </div>

    <div class="dock">
        <div class="app-icon">
            <div class="icon">📞</div>
        </div>
        <div class="app-icon">
            <div class="icon">✉️</div>
        </div>
        <div class="app-icon">
            <div class="icon">🌐</div>
        </div>
        <div class="app-icon">
            <div class="icon">🎵</div>
        </div>
    </div>

    <script>
        // === 核心变量 ===
        const grid = document.getElementById('appGrid');
        let draggedEl = null;
        let startX = 0;
        let startY = 0;
        let offsetX = 0;
        let offsetY = 0;
        let longPressTimer = null;
        let isDragging = false;
        let lastMoveTime = 0;

        // === 时间同步 ===
        function updateTime() {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const timeStr = `${hh}:${mm}`;
            document.getElementById('currentTime').textContent = timeStr;
            document.getElementById('bigTime').textContent = timeStr;
            
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            const dateStr = `${now.getMonth()+1}月${now.getDate()}日 星期${weekdays[now.getDay()]}`;
            document.getElementById('currentDate').textContent = dateStr;
        }
        updateTime();
        setInterval(updateTime, 1000);

        // === 触摸拖动核心逻辑 ===
        document.querySelectorAll('.app-icon').forEach(item => {
            // 1. 手指按下：记录初始位置，启动长按计时
            item.addEventListener('touchstart', (e) => {
                // 只允许单指操作
                if (e.touches.length !== 1) return;
                
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
                
                // 获取元素当前位置（修正：使用 getBoundingClientRect 获取实时位置）
                const rect = item.getBoundingClientRect();
                offsetX = startX - rect.left;
                offsetY = startY - rect.top;

                // 重置状态
                isDragging = false;
                clearTimeout(longPressTimer);

                // 启动长按计时器：500ms 后标记为可拖动
                longPressTimer = setTimeout(() => {
                    draggedEl = item;
                    item.classList.add('dragging');
                    // 提升层级，避免被遮挡
                    item.style.position = 'absolute';
                    item.style.zIndex = '100';
                }, 500);
            });

            // 2. 手指移动：判断是否触发拖动
            item.addEventListener('touchmove', (e) => {
                if (!draggedEl) return;
                
                const touch = e.touches[0];
                const currentX = touch.clientX - offsetX;
                const currentY = touch.clientY - offsetY;

                // 轻微移动阈值：移动超过 5px 才判定为拖动，防止点击误触发
                const dx = Math.abs(touch.clientX - startX);
                const dy = Math.abs(touch.clientY - startY);
                if (dx > 5 || dy > 5) {
                    isDragging = true;
                    clearTimeout(longPressTimer); // 取消长按计时
                    
                    // 设置拖动位置
                    draggedEl.style.left = `${currentX}px`;
                    draggedEl.style.top = `${currentY}px`;

                    // 交换位置逻辑
                    swapIcons(draggedEl, currentX, currentY);
                }
            });

            // 3. 手指抬起：结束拖动
            item.addEventListener('touchend', (e) => {
                clearTimeout(longPressTimer);
                
                // 如果是短按（未拖动），执行点击事件
                if (!isDragging) {
                    alert(`点击了：${item.querySelector('.label').textContent}`);
                }

                // 重置拖动状态
                if (draggedEl) {
                    draggedEl.classList.remove('dragging');
                    // 复位到网格布局
                    resetIconPosition(draggedEl);
                    draggedEl = null;
                }
                isDragging = false;
            });

            // 4. 取消：防止滑动中断
            item.addEventListener('touchcancel', () => {
                if (draggedEl) {
                    draggedEl.classList.remove('dragging');
                    resetIconPosition(draggedEl);
                    draggedEl = null;
                }
                isDragging = false;
            });
        });

        // === 工具函数：交换图标位置 ===
        function swapIcons(draggedEl, currentX, currentY) {
            const icons = Array.from(document.querySelectorAll('.app-icon'));
            
            // 遍历所有图标，判断是否重叠
            for (const icon of icons) {
                if (icon === draggedEl) continue;
                
                const rect = icon.getBoundingClientRect();
                // 判断中心点是否在目标图标范围内
                const iconCenterX = rect.left + rect.width / 2;
                const iconCenterY = rect.top + rect.height / 2;
                
                if (
                    Math.abs(currentX - iconCenterX) < rect.width / 1.5 &&
                    Math.abs(currentY - iconCenterY) < rect.height / 1.5
                ) {
                    // 交换 DOM 节点位置
                    const temp = draggedEl.innerHTML;
                    draggedEl.innerHTML = icon.innerHTML;
                    icon.innerHTML = temp;
                    
                    // 交换 label 文本
                    const tempLabel = draggedEl.querySelector('.label').textContent;
                    draggedEl.querySelector('.label').textContent = icon.querySelector('.label').textContent;
                    icon.querySelector('.label').textContent = tempLabel;
                    
                    break;
                }
            }
        }

        // === 工具函数：复位图标位置 ===
        function resetIconPosition(el) {
            el.style.position = '';
            el.style.left = '';
            el.style.top = '';
            el.style.zIndex = '';
        }
    </script>
</body>
</html>
