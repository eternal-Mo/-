<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>墨墨机</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        body {
            background: #fff; /* 纯白背景 */
            height: 100vh;
            overflow: hidden;
        }
        /* 状态栏 */
        .status-bar {
            height: 44px;
            background: rgba(255,255,255,0.9);
            color: #000; /* 文字改为黑色 */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            font-size: 14px;
        }
        /* 主屏幕 */
        .home-screen {
            height: calc(100vh - 44px - 80px);
            background: #fff; /* 纯白背景 */
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        /* 小部件区域 */
        .widget {
            background: rgba(0,0,0,0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 15px;
            color: #000; /* 文字改为黑色 */
        }
        .widget-time {
            font-size: 36px;
            font-weight: 300;
        }
        .widget-date {
            font-size: 16px;
            opacity: 0.7;
        }
        /* 图标网格 */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: auto;
        }
        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: #000; /* 文字改为黑色 */
        }
        .app-icon .icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            background: rgba(0,0,0,0.08);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .app-icon .label {
            font-size: 12px;
        }
        /* 底部 Dock 栏 */
        .dock {
            height: 80px;
            background: rgba(255,255,255,0.9);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 20px;
        }
        .dock .app-icon .icon {
            width: 50px;
            height: 50px;
        }
    </style>
</head>
<body>
    <!-- 状态栏 -->
    <div class="status-bar">
        <span>20:25</span>
        <span>📶 🔋 100%</span>
    </div>

    <!-- 主屏幕 -->
    <div class="home-screen">
        <!-- 时间小部件 -->
        <div class="widget">
            <div class="widget-time">20:25</div>
            <div class="widget-date">3月14日 星期六</div>
        </div>

        <!-- 应用图标网格 -->
        <div class="app-grid">
            <div class="app-icon">
                <div class="icon">📱</div>
                <div class="label">电话</div>
            </div>
            <div class="app-icon">
                <div class="icon">💬</div>
                <div class="label">信息</div>
            </div>
            <div class="app-icon">
                <div class="icon">🌐</div>
                <div class="label">浏览器</div>
            </div>
            <div class="app-icon">
                <div class="icon">📷</div>
                <div class="label">相机</div>
            </div>
            <div class="app-icon">
                <div class="icon">🎵</div>
                <div class="label">音乐</div>
            </div>
            <div class="app-icon">
                <div class="icon">📝</div>
                <div class="label">备忘录</div>
            </div>
            <div class="app-icon">
                <div class="icon">🗺️</div>
                <div class="label">地图</div>
            </div>
            <div class="app-icon">
                <div class="icon">⚙️</div>
                <div class="label">设置</div>
            </div>
        </div>
    </div>

    <!-- 底部 Dock 栏 -->
    <div class="dock">
        <div class="app-icon">
            <div class="icon">📞</div>
        </div>
        <div class="app-icon">
            <div class="icon">✉️</div>
        </div>
        <div class="app-icon">
            <div class="icon">🌐</div>
        </div>
        <div class="app-icon">
            <div class="icon">🎵</div>
        </div>
    </div>
</body>
</html>
