<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>墨墨机</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none; /* 禁用系统默认长按菜单 */
        }
        body {
            background: #fafafa; /* 极简浅灰背景 */
            height: 100vh;
            overflow: hidden;
            color: #111;
        }
        /* 状态栏 */
        .status-bar {
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        /* 主屏幕 */
        .home-screen {
            height: calc(100vh - 44px - 90px);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        /* 小部件 */
        .widget {
            background: #fff;
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .widget-time {
            font-size: 42px;
            font-weight: 200;
            letter-spacing: 2px;
        }
        .widget-date {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
            font-weight: 300;
        }
        /* 图标网格 */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            row-gap: 25px;
            column-gap: 15px;
            margin-top: auto;
        }
        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        /* 黑白 ins 风图标 */
        .app-icon .icon {
            width: 58px;
            height: 58px;
            border-radius: 18px;
            background: #111;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        .app-icon .label {
            font-size: 11px;
            color: #333;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        /* Dock 栏 */
        .dock {
            height: 90px;
            background: #fff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 15px 15px 15px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.02);
            border-top: 1px solid #f5f5f5;
        }
        .dock .app-icon .icon {
            background: #fff;
            color: #111;
            border: 1.5px solid #111;
            box-shadow: none;
        }
        .dock .app-icon .label {
            display: none; /* Dock栏通常不显示文字，更极简 */
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <span id="currentTime">00:00</span>
        <span>LTE &nbsp; 🔋</span>
    </div>

    <div class="home-screen">
        <div class="widget">
            <div class="widget-time" id="bigTime">00:00</div>
            <div class="widget-date" id="currentDate">1月1日 星期一</div>
        </div>

        <div class="app-grid" id="appGrid">
            <div class="app-icon"><div class="icon">✆</div><div class="label">电话</div></div>
            <div class="app-icon"><div class="icon">✉</div><div class="label">信息</div></div>
            <div class="app-icon"><div class="icon">⚲</div><div class="label">浏览</div></div>
            <div class="app-icon"><div class="icon">◎</div><div class="label">相机</div></div>
            <div class="app-icon"><div class="icon">♫</div><div class="label">音乐</div></div>
            <div class="app-icon"><div class="icon">✎</div><div class="label">备忘</div></div>
            <div class="app-icon"><div class="icon">◷</div><div class="label">时钟</div></div>
            <div class="app-icon"><div class="icon">❖</div><div class="label">设置</div></div>
        </div>
    </div>

    <div class="dock">
        <div class="app-icon"><div class="icon">✆</div><div class="label">电话</div></div>
        <div class="app-icon"><div class="icon">✉</div><div class="label">信息</div></div>
        <div class="app-icon"><div class="icon">⚲</div><div class="label">浏览</div></div>
        <div class="app-icon"><div class="icon">♫</div><div class="label">音乐</div></div>
    </div>

    <script>
        // === 时间同步 ===
        function updateTime() {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const timeStr = `${hh}:${mm}`;
            document.getElementById('currentTime').textContent = timeStr;
            document.getElementById('bigTime').textContent = timeStr;
            
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            const dateStr = `${now.getMonth()+1}月${now.getDate()}日 星期${weekdays[now.getDay()]}`;
            document.getElementById('currentDate').textContent = dateStr;
        }
        updateTime();
        setInterval(updateTime, 1000);

        // === 顺滑拖动核心逻辑 ===
        let draggedEl = null;
        let dragClone = null; // 用于跟随手指的影子
        let startX = 0, startY = 0;
        let offsetX = 0, offsetY = 0;
        let longPressTimer = null;
        let isDragging = false;

        // 节点交换工具函数（比替换 innerHTML 快一百倍）
        function swapNodes(node1, node2) {
            const parent1 = node1.parentNode;
            const sibling1 = node1.nextSibling === node2 ? node1 : node1.nextSibling;
            node2.parentNode.insertBefore(node1, node2);
            parent1.insertBefore(node2, sibling1);
        }

        document.querySelectorAll('.app-icon').forEach(item => {
            item.addEventListener('touchstart', (e) => {
                if (e.touches.length !== 1) return;
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
                isDragging = false;

                // 300ms触发长按，敏感度适中
                longPressTimer = setTimeout(() => {
                    isDragging = true;
                    draggedEl = item;
                    
                    // 创建一个影子节点跟着手指走
                    const rect = item.getBoundingClientRect();
                    dragClone = item.cloneNode(true);
                    
                    offsetX = startX - rect.left;
                    offsetY = startY - rect.top;

                    dragClone.style.position = 'fixed';
                    dragClone.style.left = rect.left + 'px';
                    dragClone.style.top = rect.top + 'px';
                    dragClone.style.width = rect.width + 'px';
                    dragClone.style.height = rect.height + 'px';
                    dragClone.style.zIndex = '9999';
                    dragClone.style.opacity = '0.9';
                    dragClone.style.transform = 'scale(1.1)'; // 微微放大
                    dragClone.style.margin = '0';
                    dragClone.style.pointerEvents = 'none'; // 让影子不阻挡底下的触摸检测
                    
                    document.body.appendChild(dragClone);
                    
                    // 把原来的图标隐藏当占位符
                    item.style.opacity = '0';
                    
                    // 手机震动反馈（如果设备支持）
                    if (navigator.vibrate) navigator.vibrate(50);
                }, 300); 
            });

            item.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                
                // 如果手指滑动超过10px且还没触发长按，就取消长按（防止滑动页面时误触）
                if (!isDragging) {
                    if (Math.abs(touch.clientX - startX) > 10 || Math.abs(touch.clientY - startY) > 10) {
                        clearTimeout(longPressTimer);
                    }
                    return;
                }

                e.preventDefault(); // 阻止屏幕下拉刷新等默认行为

                // 让影子跟着手指顺滑移动
                dragClone.style.left = (touch.clientX - offsetX) + 'px';
                dragClone.style.top = (touch.clientY - offsetY) + 'px';

                // 检测手指目前滑动到了哪个图标上面
                const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
                const targetIcon = targetEl ? targetEl.closest('.app-icon') : null;

                // 如果碰到了其他的图标，直接交换真实 DOM 的位置
                if (targetIcon && targetIcon !== draggedEl) {
                    swapNodes(draggedEl, targetIcon);
                }
            }, { passive: false });

            const endDrag = () => {
                clearTimeout(longPressTimer);
                if (isDragging && dragClone && draggedEl) {
                    dragClone.remove(); // 删掉影子
                    dragClone = null;
                    draggedEl.style.opacity = '1'; // 恢复原图标显示
                    draggedEl = null;
                    isDragging = false;
                }
            };

            item.addEventListener('touchend', endDrag);
            item.addEventListener('touchcancel', endDrag);
        });
    </script>
</body>
</html>
